<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">SSR, SSG, and ISR rendering strategies</title>
  <desc id="desc">Three rendering paths: request-time rendering, build-time generation, and cached regeneration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#091326"/>
      <stop offset="1" stop-color="#15102d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".3"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1450" cy="80" r="260" fill="#4f46e5" opacity=".12"/>
  <circle cx="120" cy="820" r="300" fill="#06b6d4" opacity=".08"/>
  <g stroke="#334155" stroke-width="3" opacity=".35">
    <path d="M0 180h1600M0 360h1600M0 540h1600M0 720h1600"/>
    <path d="M320 0v900M640 0v900M960 0v900M1280 0v900"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="110" y="220" width="390" height="430" rx="28" fill="#101d35" stroke="#22d3ee" stroke-width="4"/>
    <rect x="605" y="220" width="390" height="430" rx="28" fill="#171936" stroke="#a78bfa" stroke-width="4"/>
    <rect x="1100" y="220" width="390" height="430" rx="28" fill="#211b31" stroke="#fbbf24" stroke-width="4"/>
  </g>
  <g fill="none" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M190 350h180l55 55" stroke="#22d3ee"/>
    <path d="M245 405l-55 55m180-55 55 55" stroke="#22d3ee"/>
    <path d="M685 460V350h230" stroke="#a78bfa"/>
    <path d="M735 350v110m130-110v110" stroke="#a78bfa"/>
    <path d="M1180 430c45-85 180-80 210 10 28 84-70 150-145 99" stroke="#fbbf24"/>
    <path d="M1240 530l-20 35 42 2" stroke="#fbbf24"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" fill="#f8fafc" text-anchor="middle">
    <text x="305" y="285" font-size="42" font-weight="700">SSR</text>
    <text x="800" y="285" font-size="42" font-weight="700">SSG</text>
    <text x="1295" y="285" font-size="42" font-weight="700">ISR</text>
    <text x="305" y="565" font-size="24" fill="#a5f3fc">render per request</text>
    <text x="800" y="565" font-size="24" fill="#ddd6fe">generate at build time</text>
    <text x="1295" y="565" font-size="24" fill="#fde68a">refresh cached pages</text>
  </g>
  <path d="M505 435h80m410 0h80" stroke="#64748b" stroke-width="5" stroke-dasharray="12 14"/>
  <g font-family="Arial, Helvetica, sans-serif" fill="#cbd5e1" text-anchor="middle">
    <text x="800" y="790" font-size="30" letter-spacing="4">FRESHNESS · SPEED · SERVER COST</text>
  </g>
</svg>
