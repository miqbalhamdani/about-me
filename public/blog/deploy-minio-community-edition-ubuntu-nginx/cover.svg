<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">MinIO on Ubuntu behind NGINX</title>
  <desc id="desc">A technical architecture illustration with internet traffic flowing through an NGINX TLS gateway to separate MinIO S3 and console endpoints.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081018"/>
      <stop offset="1" stop-color="#152632"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef3e42"/>
      <stop offset="1" stop-color="#ff7a52"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".32"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#background)"/>
  <path d="M0 720 C280 610 390 850 690 726 C1030 586 1200 790 1600 632 V900 H0Z" fill="#0d1d27"/>
  <g opacity=".12" stroke="#d9e9ef" stroke-width="1">
    <path d="M80 0V900M240 0V900M400 0V900M560 0V900M720 0V900M880 0V900M1040 0V900M1200 0V900M1360 0V900M1520 0V900"/>
    <path d="M0 100H1600M0 260H1600M0 420H1600M0 580H1600M0 740H1600"/>
  </g>

  <g transform="translate(112 110)">
    <rect width="156" height="34" rx="17" fill="#d9e9ef" fill-opacity=".12"/>
    <circle cx="22" cy="17" r="5" fill="#63d4a1"/>
    <text x="38" y="22" fill="#d9e9ef" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="1.5">DEPLOYMENT</text>
    <text x="0" y="116" fill="#f4f8fa" font-family="Inter, Arial, sans-serif" font-size="70" font-weight="700">MINIO ON UBUNTU</text>
    <text x="0" y="177" fill="#9db2bd" font-family="Inter, Arial, sans-serif" font-size="31">Pinned source · NGINX · TLS · systemd</text>
  </g>

  <g transform="translate(120 410)" font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <g>
      <rect width="280" height="210" rx="18" fill="#f4f8fa"/>
      <circle cx="140" cy="74" r="37" fill="#dce7eb"/>
      <path d="M112 79c12-30 45-35 58-7 18-1 29 10 29 25 0 17-13 28-31 28h-57c-19 0-31-11-31-28 0-13 10-24 32-18Z" transform="translate(0 -18)" fill="#1f3947"/>
      <text x="140" y="152" text-anchor="middle" fill="#132530" font-size="25" font-weight="700">INTERNET</text>
      <text x="140" y="181" text-anchor="middle" fill="#5c7380" font-size="16">TCP 80 / 443</text>
    </g>

    <path d="M300 105H468" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="m454 88 24 17-24 17" fill="none" stroke="#ff694e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(500)">
      <rect width="300" height="210" rx="18" fill="#f4f8fa"/>
      <path d="M78 50h144v82H78z" fill="#1f3947"/>
      <path d="M92 66h116v12H92zm0 25h76v12H92z" fill="#ef3e42"/>
      <circle cx="196" cy="97" r="9" fill="#63d4a1"/>
      <text x="150" y="159" text-anchor="middle" fill="#132530" font-size="25" font-weight="700">NGINX + TLS</text>
      <text x="150" y="186" text-anchor="middle" fill="#5c7380" font-size="16">Reverse proxy gateway</text>
    </g>

    <path d="M820 70H968" stroke="#9db2bd" stroke-width="6" stroke-linecap="round"/>
    <path d="M820 142H968" stroke="#9db2bd" stroke-width="6" stroke-linecap="round"/>
    <path d="m954 55 22 15-22 15m0 42 22 15-22 15" fill="none" stroke="#9db2bd" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(1000 -45)">
      <rect width="360" height="134" rx="18" fill="#ef3e42"/>
      <text x="28" y="48" fill="#fff" font-size="17" font-weight="600" letter-spacing="2">S3 API</text>
      <text x="28" y="83" fill="#fff" font-size="25" font-weight="700">127.0.0.1:9000</text>
      <text x="28" y="110" fill="#ffe4df" font-size="15">Authenticated object storage</text>
      <path d="M296 38h34v58h-34zm-16 11h14v36h-14zm52 8h14v20h-14z" fill="#fff" fill-opacity=".92"/>
    </g>

    <g transform="translate(1000 121)">
      <rect width="360" height="134" rx="18" fill="#f4f8fa"/>
      <text x="28" y="48" fill="#5c7380" font-size="17" font-weight="600" letter-spacing="2">CONSOLE</text>
      <text x="28" y="83" fill="#132530" font-size="25" font-weight="700">127.0.0.1:9001</text>
      <text x="28" y="110" fill="#5c7380" font-size="15">Administrator IP allowlist</text>
      <rect x="292" y="41" width="48" height="43" rx="7" fill="#1f3947"/>
      <path d="M302 41V31c0-18 28-18 28 0v10" fill="none" stroke="#1f3947" stroke-width="7"/>
      <circle cx="316" cy="62" r="5" fill="#63d4a1"/>
    </g>
  </g>

  <g transform="translate(112 800)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">
    <text fill="#63d4a1">● HEALTHY</text>
    <text x="145" fill="#9db2bd">LOOPBACK ONLY</text>
    <text x="335" fill="#9db2bd">TLS 1.2 / 1.3</text>
    <text x="530" fill="#9db2bd">AUTOMATIC RENEWAL</text>
  </g>
</svg>
